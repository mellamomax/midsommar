<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Midsommar</title>
    <meta name="description" content="Midsommarapp för prepp, lekar och poäng." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="login-screen" id="login-screen" aria-label="Välj användare">
      <img class="login-screen__image" src="assets/prep-sunny-bg.png" alt="" />
      <div class="login-screen__shade"></div>
      <div class="login-card">
        <span class="micro-label">Midsommar 2026</span>
        <h1>Vem är du?</h1>
        <p>Skriv ditt eget namn. Sen låses appen till dig.</p>
        <form class="login-form" id="login-form">
          <input id="login-name" name="name" autocomplete="given-name" placeholder="Ditt namn" />
          <label class="login-photo-picker">
            <input id="login-photo" type="file" accept="image/*" capture="user" />
            <span id="login-photo-label">Ta profilbild</span>
            <img id="login-photo-preview" alt="Profilbild" hidden />
          </label>
          <button type="submit">Fortsätt</button>
        </form>
      </div>
    </section>

    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-main">
          <div class="brand-lockup">
            <button class="brand-mark brand-profile-button" id="home-profile-button" type="button" aria-label="Gå till profilstart">
              <span id="brand-profile-initial">M</span>
              <img id="brand-profile-avatar" alt="" hidden />
            </button>
            <div>
              <strong>Midsommar 2026</strong>
            </div>
          </div>
          <button class="profile-button" id="profile-button" type="button">
            <span id="profile-initial">?</span>
            <small id="profile-label">Välj</small>
          </button>
        </div>
        <section class="forecast-strip" aria-label="Väderprognos" id="forecast-strip"></section>
      </header>

      <nav class="page-tabs" aria-label="Huvudsidor">
        <button class="page-tab is-active" type="button" data-page="prep">Prepp</button>
        <button class="page-tab" type="button" data-page="party">Midsommar</button>
      </nav>

      <main class="app-main">
        <section class="page is-active" id="prep-page" aria-label="Prepp">
          <section class="prep-hero">
            <img class="prep-hero__image" src="assets/prep-sunny-bg.png" alt="" />
            <div class="prep-hero__shade"></div>
            <div class="prep-hero__content">
              <div class="prep-welcome">
                <strong>Midsommar 2026</strong>
                <small>Fredag 19 juni</small>
              </div>

              <div class="countdown-ring" id="countdown-ring" aria-label="Nedräkning till midsommar">
                <span>Nedräkning</span>
                <strong id="countdown-days">00</strong>
                <small id="countdown-time">00:00:00 kvar</small>
              </div>

              <section class="prep-stack">
                <div class="prep-location-pin" aria-label="Taltrastvägen 12, Eskilstuna" title="Taltrastvägen 12, Eskilstuna">⌖</div>
                <article class="prep-rsvp-card">
                  <div>
                    <span class="micro-label">OSA</span>
                    <strong id="rsvp-count">0/8 klara</strong>
                  </div>
                  <div class="rsvp-list" id="rsvp-list"></div>
                </article>

                <details class="prep-pack-card">
                  <summary>
                    <span>Packlista</span>
                    <strong id="pack-count">0 kvar</strong>
                  </summary>
                  <div class="pack-list" id="pack-list"></div>
                </details>
              </section>
            </div>
          </section>
        </section>

        <section class="page" id="party-page" aria-label="Midsommar">
          <nav class="section-tabs" aria-label="Midsommar sektioner">
            <button class="section-tab is-active" type="button" data-section="today">Start</button>
            <button class="section-tab" type="button" data-section="games">Lekar</button>
            <button class="section-tab" type="button" data-section="score">Poäng</button>
            <button class="section-tab" type="button" data-section="photos">Bilder</button>
            <button class="section-tab" type="button" data-section="pentathlon">5-kamp</button>
            <button class="section-tab" type="button" data-section="match">Match</button>
          </nav>

          <section class="party-panel">
            <div class="panel-head">
              <span id="party-kicker">Start</span>
              <strong id="party-title">Dashboard</strong>
            </div>
            <div class="panel-content" id="party-content" tabindex="-1"></div>
          </section>
        </section>
      </main>
    </div>

    <dialog class="profile-dialog" id="profile-dialog">
      <form method="dialog">
        <h2>Profil</h2>
        <p id="profile-dialog-copy">Du kan se din valda profil här.</p>
        <div class="current-profile-card" id="current-profile-card">
          <span>Vald profil</span>
          <strong id="dialog-profile-name">Ingen vald</strong>
        </div>
        <label class="admin-code-field" id="admin-code-row">
          <span>Admin kod</span>
          <div>
            <input id="admin-code-input" inputmode="numeric" maxlength="4" placeholder="0202" autocomplete="one-time-code" />
            <button type="button" data-admin-code>Lås upp</button>
          </div>
        </label>
        <button class="admin-mode-button" type="button" data-admin-mode>Admin mode</button>
        <label class="admin-name-field">
          <span>Aktivt namn</span>
          <input id="admin-name-input" placeholder="Skriv namn" />
          <button type="button" data-admin-login>Byt</button>
        </label>
        <div class="profile-grid" id="profile-grid"></div>
      </form>
    </dialog>

    <div class="toast" id="toast" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
